<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渔夫探针</title>
<link rel="icon" type="image/png" href="/icons/favicon.png?v=21">
<link rel="stylesheet" href="/style.css?v=19">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
</head>
<body>
<div id="login" class="login-box">
  <h1>探针监控</h1>
  <input id="username" placeholder="用户名" value="admin">
  <input id="password" type="password" placeholder="密码">
  <button id="loginBtn">登录</button>
  <div id="loginErr" class="err"></div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="header-left">
      <img class="brand-logo" src="/icons/logo.png" alt="渔夫探针">
      <h1>渔夫探针</h1>
      <span class="subtitle">实时服务器状态</span>
    </div>
    <div class="header-right">
      <button id="installCmdBtn" title="生成并复制 Linux 客户端一键安装命令" class="primary">📋 生成安装命令</button>
      <div class="view-toggle" id="viewToggle">
        <button data-mode="card" title="卡片视图">卡片</button>
        <button data-mode="list" title="列表视图">列表</button>
      </div>
      <button id="themeBtn" title="切换主题">🌙</button>
      <span id="user"></span>
      <button id="logoutBtn">退出</button>
    </div>
  </header>

  <div class="summary-cards">
    <div class="summary-card">
      <div class="summary-label">总台数</div>
      <div class="summary-value" id="sumTotal">0</div>
    </div>
    <div class="summary-card online">
      <div class="summary-label">在线</div>
      <div class="summary-value" id="sumOnline">0</div>
    </div>
    <div class="summary-card offline">
      <div class="summary-label">离线</div>
      <div class="summary-value" id="sumOffline">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">本月下载 ↓</div>
      <div class="summary-value down" id="sumRxTraffic">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">本月上传 ↑</div>
      <div class="summary-value up" id="sumTxTraffic">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">实时下行 ↓</div>
      <div class="summary-value down" id="sumRxRate">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">实时上行 ↑</div>
      <div class="summary-value up" id="sumTxRate">0</div>
    </div>
  </div>

  <div id="groupTabs" class="group-tabs"></div>

  <div id="agentsGrid" class="agents-grid"></div>
  <div id="agentsTable" class="agents-table hidden"></div>

  <div id="detail" class="hidden">
    <div class="detail-bar">
      <strong id="detailTitle"></strong>
      <button id="closeDetail">关闭</button>
    </div>
    <div id="chart" style="width:100%;height:320px;"></div>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-box">
      <h3>编辑机器</h3>
      <label>显示名称</label>
      <input id="editName" placeholder="留空则显示主机名">
      <label>分组 <span style="color:var(--text-2);font-weight:normal">（自定义分组名，离线的客户端自动进入「离线」分组）</span></label>
      <input id="editGroup" list="group-options" placeholder="留空为「未分组」，可从下拉选择或手输新名字">
      <datalist id="group-options"></datalist>
      <label>备注</label>
      <textarea id="editRemark" rows="3" placeholder="可选，例如：生产环境 Web 节点"></textarea>
      <label>VPS 到期时间 <span style="color:var(--text-2);font-weight:normal">（留空表示不设置）</span></label>
      <input id="editExpire" type="date">
      <div class="modal-actions">
        <button id="editCancel">取消</button>
        <button id="editSave" class="primary">保存</button>
      </div>
    </div>
  </div>

  <div id="installModal" class="modal hidden">
    <div class="modal-box">
      <h3>客户端一键安装命令</h3>
      <p style="color:var(--text-2);font-size:13px;margin:-4px 0 8px">到新 VPS 上粘贴执行即可（需 root + curl + systemd）。</p>
      <textarea id="installCmdText" rows="4" readonly style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;width:100%;box-sizing:border-box;background:var(--bg-2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;resize:vertical"></textarea>
      <div class="modal-actions">
        <button id="installCopyBtn" class="primary">复制到剪贴板</button>
        <button id="installCloseBtn">关闭</button>
      </div>
    </div>
  </div>

  <div id="sshPassModal" class="modal hidden">
    <div class="modal-box">
      <h3>Web SSH 连接</h3>
      <p style="color:var(--text-2);font-size:13px;margin:-4px 0 8px">请输入 Web SSH 密码（服务端设置，连续错误 5 次将锁定该客户端 24 小时）。</p>
      <input id="sshPassInput" type="password" placeholder="SSH 密码" autocomplete="off">
      <div id="sshPassErr" class="err"></div>
      <div class="modal-actions">
        <button id="sshPassCancel">取消</button>
        <button id="sshPassConnect" class="primary">连接</button>
      </div>
    </div>
  </div>

  <div id="termModal" class="modal hidden">
    <div class="modal-box term-box">
      <div class="term-bar">
        <strong id="termTitle">Web SSH</strong>
        <button id="termClose">关闭</button>
      </div>
      <div id="term"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="/app.js?v=18"></script>
</body>
</html>

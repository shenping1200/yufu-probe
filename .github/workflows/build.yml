name: Build and Push Server Image

# 在强机器(CI)上编译一次，发布为 GHCR 预编译镜像，
# 用户安装时只 docker pull，1C1G 等低配机器零编译、安装从 ~10 分钟降到 ~1-2 分钟。
on:
  push:
    branches: [main]
    tags: ['v*']
    # 仅当影响镜像内容时重建，避免改文档/脚本也浪费 6 分钟重新构建
    paths:
      - 'Dockerfile.server'
      - 'server/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: shenping1200/yufu-probe

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (跨架构编译 arm64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (标签)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 设为公开，使安装机可匿名 docker pull（无需登录 ghcr.io）
      - name: Make package public
        if: success()
        run: |
          gh api -X PATCH \
            "users/${{ github.repository_owner }}/packages/container/${{ env.IMAGE_NAME }}/visibility" \
            -f visibility=public \
            || echo "::warning::设为公开失败，可手动在 GitHub Packages 页面将 ${{ env.IMAGE_NAME }} 设为 Public"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
